# Copyright (c) 2026-2026 Bridge Zhang <contact@bridgezhang.com>

site_name: Bridge Between Engineers
site_url: https://www.bridgezhang.com/
site_author: Bridge Zhang
site_description: >-
  机械工程学习笔记、设计思考与实践经验，
  连接理论与真实工程场景。

repo_url: https://github.com/bridgezhang123/bridge-between-engineers
repo_name: bridgezhang123/bridge-between-engineers
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026-2026 Bridge Zhang

theme:
  name: material
  custom_dir: overrides
  logo: images/logo.png
  favicon: images/favicon.ico
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
      enable_parallel_processing: false
      enable_git_follow: false
  - git-committers:
      enabled: !ENV [ENABLE_GIT_COMMITTERS, true]
      repository: bridgezhang123/bridge-between-engineers
      branch: main
      docs_path: docs/
      token: !ENV [GITHUB_TOKEN, ""]

nav:
  - Home: index.md
  - 设计见解:
    - 导览: design/index.md
    - 设计方法: design/design-philosophy.md
    - AI 协作工作流: design/ai-workflow.md
    - 供应商背景: design/supplier-background.md
    - 普通话沟通与工程表达: design/mandarin-communication.md
    - 设计案例: design/design-cases.md
  - 建模与图纸:
    - 导览: modeling/index.md
    - 命名标准: modeling/naming-standards.md
    - 建模方式: modeling/modeling-method.md
    - 参数化建模: modeling/parametric-modeling.md
    - 配置功能: modeling/configurations.md
    - 图纸模板: modeling/drawing-template.md
    - 基本标注: modeling/dimensioning.md
    - 爆炸视图: modeling/exploded-view.md
    - BOM 表: modeling/bom-guide.md
    - 版本迭代: modeling/revision-control.md
  - 制造:
    - 导览: manufacturing/index.md
    - 机加工基础: manufacturing/machining-basics.md
    - 工艺规划: manufacturing/process-planning.md
    - 表面处理: manufacturing/surface-finish.md
  - 测量:
    - 导览: measurement/index.md
    - 测量工具: measurement/tools.md
    - 形位公差检验: measurement/gdt.md
    - 质量控制: measurement/quality-control.md
  - 关于:
    - 导览: about/index.md
    - 关于作者: about/author.md
    - 关于站点: about/site.md
    - 建站说明: about/site-building.md
    - 协作说明: about/collaboration.md
    - 版权与许可: about/copyright-license.md
    - 致谢: about/acknowledgements.md
    - 更新日志: about/changelog.md

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:contact@bridgezhang.com

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

        - name: markmap
          class: language-markmap
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
  - https://cdn.jsdelivr.net/npm/markmap-lib
  - https://cdn.jsdelivr.net/npm/markmap-view
  - javascripts/markmap.js
  - javascripts/home.js
  - javascripts/print-button.js
  - javascripts/theme-toggle.js

hooks:
  - hooks/search_worker.py
