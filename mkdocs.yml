# Copyright (c) 2026-2026 Bridge Zhang <contact@bridgezhang.com>

site_name: Bridge Between Engineers
site_url: https://www.bridgezhang.com/
site_author: Bridge Zhang
site_description: >-
  Mechanical engineering notes, design insights, and practical knowledge -
  bridging theory and real-world engineering.
  机械工程笔记、设计见解与实践知识，连接理论与真实工程。

repo_url: https://github.com/bridgezhang123/bridge-zhang-technology-website
repo_name: bridgezhang123/bridge-zhang-technology-website
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026-2026 Bridge Zhang

theme:
  name: material
  custom_dir: overrides
  logo: images/logo.png
  favicon: images/favicon.ico
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode / 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode / 切换至浅色模式

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
      enable_parallel_processing: false
      enable_git_follow: false
  - git-committers:
      enabled: !ENV [ENABLE_GIT_COMMITTERS, true]
      repository: bridgezhang123/bridge-zhang-technology-website
      branch: main
      docs_path: docs/
      token: !ENV [GITHUB_TOKEN, ""]

nav:
  - Home: index.md
  - Getting Started / 入门:
    - Overview / 导览: getting-started/index.md
    - Site Guide / 站点导览: getting-started/site-guide.md
    - Learning Path / 学习路径: getting-started/learning-path.md
  - Design Insights / 设计见解:
    - Overview / 导览: design/index.md
    - Design Philosophy / 设计方法: design/design-philosophy.md
    - Design Cases / 设计案例: design/design-cases.md
  - Modeling & Drawings / 建模与图纸:
    - Overview / 导览: modeling/index.md
    - Naming Standards / 命名标准: modeling/naming-standards.md
    - Modeling Method / 建模方式: modeling/modeling-method.md
    - Parametric Modeling / 参数化建模: modeling/parametric-modeling.md
    - Configurations / 配置功能: modeling/configurations.md
    - Drawing Template / 图纸模板: modeling/drawing-template.md
    - Dimensioning Basics / 基本标注: modeling/dimensioning.md
    - Exploded Views / 爆炸视图: modeling/exploded-view.md
    - BOM Practice / BOM 表: modeling/bom-guide.md
    - Revision Control / 版本迭代: modeling/revision-control.md
  - Manufacturing / 制造:
    - Overview / 导览: manufacturing/index.md
    - Machining Basics / 机加工基础: manufacturing/machining-basics.md
    - Process Planning / 工艺规划: manufacturing/process-planning.md
    - Surface Finish / 表面处理: manufacturing/surface-finish.md
  - Measurement / 测量:
    - Overview / 导览: measurement/index.md
    - Measurement Tools / 测量工具: measurement/tools.md
    - GD&T Inspection / 形位公差检验: measurement/gdt.md
    - Quality Control / 质量控制: measurement/quality-control.md
  - About / 关于:
    - Overview / 导览: about/index.md
    - About Author / 关于作者: about/author.md
    - About This Site / 关于站点: about/site.md
    - Building This Site / 建站说明: about/site-building.md
    - Collaboration / 协作说明: about/collaboration.md
    - Copyright & License / 版权与许可: about/copyright-license.md
    - Acknowledgements / 致谢: about/acknowledgements.md
    - Changelog / 更新日志: about/changelog.md

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:contact@bridgezhang.com

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
  - javascripts/home.js
  - javascripts/print-button.js
  - javascripts/theme-toggle.js

hooks:
  - hooks/search_worker.py
